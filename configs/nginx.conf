# configs/nginx.conf
# Reverse proxy for Deepfake Detector API + UI

upstream deepfake_api {
    server deepfake-detector:8000;
    keepalive 32;
}

upstream deepfake_ui {
    server deepfake-detector:8501;
    keepalive 16;
}

# ─── Rate limiting ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 512M;
    client_body_timeout  120s;
    proxy_read_timeout   120s;

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=5 nodelay;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://deepfake_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;
    }

    # ── API docs ─────────────────────────────────────────────────────────────
    location /docs {
        proxy_pass http://deepfake_api/docs;
    }
    location /openapi.json {
        proxy_pass http://deepfake_api/openapi.json;
    }

    # ── Streamlit UI ─────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://deepfake_ui;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;     # long timeout for Streamlit WebSocket
    }

    # ── Streamlit static ─────────────────────────────────────────────────────
    location /_stcore/ {
        proxy_pass         http://deepfake_ui/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
